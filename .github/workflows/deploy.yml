name: Deploy frontend

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create production environment
        env:
          VITE_ENV_FILE: ${{ secrets.VITE_ENV_FILE }}
        run: |
          test -n "$VITE_ENV_FILE"
          printf '%s\n' "$VITE_ENV_FILE" > .env.production

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy dist to cPanel
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          test -n "$SSH_USER"
          rsync -az --delete \
            --filter='P .well-known/' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:/home/pixelwor/paplats.pixelworks.se/"
